name: Generate EPG

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:        # lets you run it manually too

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Generate Iran International EPG
        run: python iranintl/generate.py

      - name: Generate Manoto EPG
        run: python manoto/generate.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit updated EPG files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: update EPG $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
